[package]
name = "dbird"
version = "0.1.0"
edition = "2024"
rust-version = "1.88"
description = "A fully playable terminal recreation of the classic Flappy Bird game"

[dependencies]
crossterm = "0.29.0"
ratatui = { version = "0.30.2", default-features = false, features = ["crossterm"] }

[target.'cfg(unix)'.dependencies]
signal-hook = "0.3.18"

[profile.release]
codegen-units = 1
lto = "thin"
strip = true
