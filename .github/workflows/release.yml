name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install ALSA headers
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Update Rust
        run: |
          rustup update stable
          rustup default stable
          rustup target add ${{ matrix.target }}
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          [[ "${GITHUB_REF}" == refs/tags/* ]] || version="dev"
          name="dbird-${version}-${{ matrix.target }}"
          mkdir "$name"
          cp LICENSE README.md "$name"/
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "target/${{ matrix.target }}/release/dbird.exe" "$name"/
            7z a "${name}.zip" "$name"
          else
            cp "target/${{ matrix.target }}/release/dbird" "$name"/
            tar czf "${name}.tar.gz" "$name"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: dbird-${{ matrix.target }}
          path: |
            *.tar.gz
            *.zip
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: >
          gh release create "${GITHUB_REF_NAME}"
          --title "dbird ${GITHUB_REF_NAME}"
          --generate-notes
          ./*.tar.gz ./*.zip
